<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🎵 Reproductor Musical</title>
    <style>
        /* ============================================
           RESET Y ESTILOS BASE
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #6C3CE1;
            --primary-dark: #5A2FC7;
            --primary-light: #8B6FE8;
            --secondary: #FF6B6B;
            --accent: #FFD93D;
            --bg-start: #0f0c29;
            --bg-mid: #302b63;
            --bg-end: #24243e;
            --text-primary: #FFFFFF;
            --text-secondary: #B0B0B0;
            --card-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.08);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --radius: 24px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        html, body {
            height: 100%;
            height: 100dvh;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(145deg, var(--bg-start), var(--bg-mid), var(--bg-end));
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-primary);
            overflow: hidden;
            position: relative;
        }

        /* ============================================
           CONTENEDOR PRINCIPAL - OCUPA TODA LA PANTALLA
           ============================================ */
        .player-container {
            width: 100%;
            height: 100%;
            height: 100dvh;
            max-width: 480px;
            padding: 20px 20px calc(20px + var(--safe-bottom));
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            position: relative;
            overflow: hidden;
        }

        /* Efecto de brillo animado en el borde */
        .player-container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, var(--primary), var(--secondary), var(--accent), var(--primary));
            background-size: 400% 400%;
            border-radius: calc(var(--radius) + 2px);
            z-index: -1;
            opacity: 0.2;
            animation: borderGlow 8s ease-in-out infinite;
        }

        @keyframes borderGlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* ============================================
           HEADER
           ============================================ */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0 12px;
            flex-shrink: 0;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-title h1 {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-light), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-title .icon {
            font-size: 20px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .header-actions {
            display: flex;
            gap: 6px;
        }

        .header-btn {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .header-btn:active {
            transform: scale(0.85);
        }

        .header-btn.active {
            color: var(--accent);
            border-color: var(--accent);
        }

        /* ============================================
           PORTADA CIRCULAR - MÁS PEQUEÑA
           ============================================ */
        .album-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            padding: 4px 0;
        }

        .album-art {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            overflow: hidden;
            position: relative;
            background: linear-gradient(135deg, var(--primary-dark), var(--bg-mid));
            box-shadow: 0 12px 40px rgba(108, 60, 225, 0.25);
            flex-shrink: 0;
            border: 3px solid var(--glass-border);
        }

        .album-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Animación de giro para la portada cuando suena */
        .album-art.spinning img {
            animation: spin 10s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Anillo alrededor de la portada */
        .album-art::after {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            border: 2px solid transparent;
            background: linear-gradient(135deg, var(--primary), var(--accent), var(--secondary)) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.4;
            transition: opacity 0.5s ease;
        }

        .album-art.spinning::after {
            opacity: 0.8;
            animation: spinRing 3s linear infinite;
        }

        @keyframes spinRing {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ============================================
           ONDAS DE AUDIO
           ============================================ */
        .wave-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 3px;
            height: 28px;
            padding: 4px 0;
            flex-shrink: 0;
        }

        .wave {
            width: 4px;
            height: 6px;
            background: var(--primary-light);
            border-radius: 2px;
            animation: wave 0.8s ease-in-out infinite alternate;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .wave.active {
            opacity: 0.7;
        }

        .wave:nth-child(1) { animation-delay: 0s; height: 10px; }
        .wave:nth-child(2) { animation-delay: 0.1s; height: 16px; }
        .wave:nth-child(3) { animation-delay: 0.2s; height: 22px; }
        .wave:nth-child(4) { animation-delay: 0.3s; height: 16px; }
        .wave:nth-child(5) { animation-delay: 0.4s; height: 10px; }

        @keyframes wave {
            0% { transform: scaleY(0.3); }
            100% { transform: scaleY(1); }
        }

        /* ============================================
           CANCIÓN ACTUAL
           ============================================ */
        .song-info {
            text-align: center;
            padding: 2px 0 4px;
            flex-shrink: 0;
        }

        .song-title {
            font-size: 18px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0 8px;
        }

        .song-artist {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        /* ============================================
           FAVORITO
           ============================================ */
        .favorite-btn {
            background: none;
            border: none;
            font-size: 26px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: block;
            margin: 0 auto;
            padding: 4px;
            flex-shrink: 0;
        }

        .favorite-btn:active {
            transform: scale(0.7);
        }

        .favorite-btn.liked {
            animation: likePop 0.4s ease;
        }

        @keyframes likePop {
            0% { transform: scale(1); }
            50% { transform: scale(1.5); }
            100% { transform: scale(1); }
        }

        /* ============================================
           CONTROLES PRINCIPALES
           ============================================ */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            padding: 4px 0;
            flex-shrink: 0;
        }

        .controls button {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .controls button:active {
            transform: scale(0.85);
        }

        .controls .play-btn {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            font-size: 26px;
            box-shadow: 0 8px 25px rgba(108, 60, 225, 0.35);
        }

        .controls .play-btn:active {
            transform: scale(0.9);
            box-shadow: 0 4px 15px rgba(108, 60, 225, 0.2);
        }

        /* ============================================
           PROGRESO
           ============================================ */
        .progress-container {
            width: 100%;
            padding: 4px 0;
            flex-shrink: 0;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.12);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
            touch-action: none;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 2px;
            width: 0%;
            transition: width 0.05s linear;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            right: -5px;
            top: 50%;
            transform: translateY(-50%);
            width: 10px;
            height: 10px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255, 217, 61, 0.3);
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .progress-bar:active .progress-fill::after {
            opacity: 1;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            color: var(--text-secondary);
            font-size: 10px;
            margin-top: 3px;
            font-variant-numeric: tabular-nums;
        }

        /* ============================================
           EXTRAS: Aleatorio, Repetir, Volumen
           ============================================ */
        .extras-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 2px;
            flex-shrink: 0;
        }

        .extras-bar .group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .extras-bar .group .icon-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 4px;
        }

        .extras-bar .group .icon-btn:active {
            transform: scale(0.8);
        }

        .extras-bar .group .icon-btn.active {
            color: var(--accent);
        }

        .extras-bar .group .icon-btn.active-shuffle {
            color: var(--secondary);
        }

        .volume-slider {
            width: 70px;
            height: 3px;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.15);
            border-radius: 2px;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 217, 61, 0.15);
        }

        /* ============================================
           BOTÓN PARA ABRIR PLAYLIST (MODAL)
           ============================================ */
        .open-playlist-btn {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 0 auto;
            flex-shrink: 0;
            width: fit-content;
        }

        .open-playlist-btn:active {
            transform: scale(0.95);
        }

        .open-playlist-btn .badge {
            background: var(--primary);
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ============================================
           MODAL - LISTA DE REPRODUCCIÓN
           ============================================ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            padding: 20px;
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: linear-gradient(145deg, rgba(30,27,75,0.95), rgba(20,18,50,0.98));
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 28px 28px 0 0;
            width: 100%;
            max-width: 440px;
            max-height: 70vh;
            padding: 20px 20px calc(20px + var(--safe-bottom));
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1px solid var(--glass-border);
            border-bottom: none;
            display: flex;
            flex-direction: column;
        }

        .modal-overlay.show .modal {
            transform: translateY(0);
        }

        /* Indicador de arrastre */
        .modal-handle {
            width: 40px;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            margin: 0 auto 16px;
            flex-shrink: 0;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-shrink: 0;
        }

        .modal-header h2 {
            font-size: 18px;
            font-weight: 600;
        }

        .modal-header .close-btn {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-header .close-btn:active {
            transform: scale(0.85);
        }

        .modal-playlist {
            flex: 1;
            overflow-y: auto;
            padding-right: 4px;
        }

        .modal-playlist::-webkit-scrollbar {
            width: 3px;
        }

        .modal-playlist::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 2px;
        }

        .modal-playlist::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 2px;
        }

        .modal-item {
            display: flex;
            align-items: center;
            padding: 12px 14px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 2px;
            gap: 12px;
        }

        .modal-item:active {
            transform: scale(0.97);
        }

        .modal-item.active {
            background: rgba(108, 60, 225, 0.2);
            border-left: 3px solid var(--primary);
        }

        .modal-item .num {
            font-size: 12px;
            color: var(--text-secondary);
            width: 24px;
            text-align: center;
            flex-shrink: 0;
            font-weight: 600;
            opacity: 0.5;
        }

        .modal-item .info {
            flex: 1;
            min-width: 0;
        }

        .modal-item .info .title {
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .modal-item .info .sub {
            font-size: 11px;
            color: var(--text-secondary);
            opacity: 0.6;
        }

        .modal-item .status-icon {
            font-size: 14px;
            flex-shrink: 0;
        }

        .modal-item .fav-star {
            font-size: 14px;
            flex-shrink: 0;
            color: var(--text-secondary);
            opacity: 0.3;
            transition: all 0.3s ease;
        }

        .modal-item .fav-star.favorited {
            color: var(--accent);
            opacity: 1;
        }

        .modal-empty {
            text-align: center;
            color: var(--text-secondary);
            padding: 40px 0;
            font-size: 14px;
            opacity: 0.5;
        }

        /* ============================================
           NOTIFICACIONES (Toast)
           ============================================ */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(60px);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            padding: 10px 22px;
            border-radius: 14px;
            color: white;
            font-size: 13px;
            border: 1px solid var(--glass-border);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            opacity: 0;
            pointer-events: none;
            z-index: 2000;
            max-width: 85%;
            text-align: center;
            font-weight: 500;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 420px) {
            .player-container {
                padding: 14px 14px calc(14px + var(--safe-bottom));
            }

            .album-art {
                width: 150px;
                height: 150px;
            }

            .header-title h1 {
                font-size: 16px;
            }

            .controls button {
                width: 42px;
                height: 42px;
                font-size: 18px;
            }

            .controls .play-btn {
                width: 54px;
                height: 54px;
                font-size: 22px;
            }

            .song-title {
                font-size: 16px;
            }

            .modal {
                padding: 16px 16px calc(16px + var(--safe-bottom));
                max-height: 65vh;
            }

            .volume-slider {
                width: 55px;
            }

            .extras-bar .group {
                gap: 6px;
            }
            .extras-bar .group .icon-btn {
                font-size: 16px;
            }
        }

        @media (max-width: 360px) {
            .album-art {
                width: 130px;
                height: 130px;
            }

            .controls {
                gap: 10px;
            }
            .controls button {
                width: 38px;
                height: 38px;
                font-size: 16px;
            }
            .controls .play-btn {
                width: 48px;
                height: 48px;
                font-size: 20px;
            }

            .song-title {
                font-size: 14px;
            }

            .modal-item {
                padding: 10px 12px;
            }
            .modal-item .info .title {
                font-size: 13px;
            }
        }

        @media (min-height: 800px) {
            .album-art {
                width: 200px;
                height: 200px;
            }
        }

        @media (max-height: 640px) {
            .album-art {
                width: 120px;
                height: 120px;
            }
            .controls button {
                width: 38px;
                height: 38px;
                font-size: 16px;
            }
            .controls .play-btn {
                width: 48px;
                height: 48px;
                font-size: 20px;
            }
            .wave-container {
                height: 18px;
            }
            .wave {
                height: 4px;
            }
            .wave:nth-child(1) { height: 6px; }
            .wave:nth-child(2) { height: 10px; }
            .wave:nth-child(3) { height: 14px; }
            .wave:nth-child(4) { height: 10px; }
            .wave:nth-child(5) { height: 6px; }
            .song-title {
                font-size: 15px;
            }
            .header-title h1 {
                font-size: 15px;
            }
            .open-playlist-btn {
                padding: 8px 16px;
                font-size: 12px;
            }
        }

        /* ============================================
           ANIMACIONES
           ============================================ */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .player-container {
            animation: fadeInUp 0.6s ease-out;
        }

        /* Efecto de pulsación en la portada */
        .album-art::before {
            content: '';
            position: absolute;
            inset: -20px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(108,60,225,0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .album-art.spinning::before {
            opacity: 1;
            animation: pulseRing 2s ease-in-out infinite;
        }

        @keyframes pulseRing {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.05); opacity: 0.6; }
        }
    </style>
</head>
<body>

    <!-- ============================================
    TOAST DE NOTIFICACIONES
    ============================================ -->
    <div class="toast" id="toast"></div>

    <!-- ============================================
    MODAL - LISTA DE REPRODUCCIÓN
    ============================================ -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-handle"></div>
            <div class="modal-header">
                <h2>📋 Lista de reproducción</h2>
                <button class="close-btn" id="closeModalBtn">✕</button>
            </div>
            <div class="modal-playlist" id="modalPlaylist"></div>
        </div>
    </div>

    <!-- ============================================
    REPRODUCTOR PRINCIPAL
    ============================================ -->
    <div class="player-container">

        <!-- HEADER -->
        <div class="header">
            <div class="header-title">
                <span class="icon">🎵</span>
                <h1>Mi Música</h1>
            </div>
            <div class="header-actions">
                <button class="header-btn" id="themeBtn" title="Modo oscuro/claro">🌙</button>
                <button class="header-btn" id="repeatBtn" title="Repetir">🔁</button>
            </div>
        </div>

        <!-- PORTADA CIRCULAR -->
        <div class="album-wrapper">
            <div class="album-art" id="albumArt">
                <img src="https://picsum.photos/seed/music/400/400" alt="Portada" id="albumImage">
            </div>
        </div>

        <!-- ONDAS DE AUDIO -->
        <div class="wave-container" id="waveContainer">
            <div class="wave" id="wave1"></div>
            <div class="wave" id="wave2"></div>
            <div class="wave" id="wave3"></div>
            <div class="wave" id="wave4"></div>
            <div class="wave" id="wave5"></div>
        </div>

        <!-- CANCIÓN ACTUAL -->
        <div class="song-info">
            <div class="song-title" id="currentSongTitle">🎵 Selecciona una canción</div>
            <div class="song-artist" id="currentSongArtist">📋 Lista de reproducción</div>
        </div>

        <!-- FAVORITO -->
        <button class="favorite-btn" id="favoriteBtn">🤍</button>

        <!-- CONTROLES PRINCIPALES -->
        <div class="controls">
            <button id="prevBtn" title="Anterior">⏮</button>
            <button class="play-btn" id="playBtn" title="Reproducir/Pausar">▶</button>
            <button id="nextBtn" title="Siguiente">⏭</button>
        </div>

        <!-- PROGRESO -->
        <div class="progress-container">
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="time-info">
                <span id="currentTime">0:00</span>
                <span id="totalTime">0:00</span>
            </div>
        </div>

        <!-- EXTRAS: Aleatorio, Volumen -->
        <div class="extras-bar">
            <div class="group">
                <button class="icon-btn" id="shuffleBtn" title="Aleatorio">🔀</button>
                <button class="icon-btn" id="likeBtn" title="Me gusta">❤️</button>
            </div>
            <div class="group">
                <span class="icon-btn" style="font-size:14px; color:var(--text-secondary)">🔊</span>
                <input type="range" class="volume-slider" id="volumeControl" min="0" max="1" step="0.05" value="0.8">
            </div>
        </div>

        <!-- BOTÓN PARA ABRIR PLAYLIST -->
        <button class="open-playlist-btn" id="openPlaylistBtn">
            📋 Ver lista de reproducción
            <span class="badge" id="playlistBadge">12</span>
        </button>

    </div>

    <script>
        // ============================================
        // 🎵 PLAYLIST - TUS CANCIONES QUEMADAS
        // ============================================
        const playlist = [
            { title: "EL QUE NO DUERME v1", url: "https://raw.githubusercontent.com/bryan7896/MusicBryan/main/Music/EL%20QUE%20NO%20DUERME%20v1.mp3", liked: false },
            { title: "EL QUE NO DUERME v2", url: "https://raw.githubusercontent.com/bryan7896/MusicBryan/main/Music/EL%20QUE%20NO%20DUERME%20v2.mp3", liked: false },
            { title: "El desorden perfecto", url: "https://raw.githubusercontent.com/bryan7896/MusicBryan/main/Music/El%20desorden%20perfecto.mp3", liked: false },
            { title: "El reloj se para", url: "https://raw.githubusercontent.com/bryan7896/MusicBryan/main/Music/El%20reloj%20se%20para.mp3", liked: false },
            { title: "El tamaño de tu mano", url: "https://raw.githubusercontent.com/bryan7896/MusicBryan/main/Music/El%20tama%C3%B1o%20de%20tu%20mano.mp3", liked: false },
            { title: "Mi lugar en el mundo", url: "https://raw.githubusercontent.com/bryan7896/MusicBryan/main/Music/Mi%20lugar%20en%20el%20mundo.mp3", liked: false },
            { title: "Mi princesa", url: "https://raw.githubusercontent.com/bryan7896/MusicBryan/main/Music/Mi%20princesa.mp3", liked: false },
            { title: "Si tu voluntad duele", url: "https://raw.githubusercontent.com/bryan7896/MusicBryan/main/Music/Si%20tu%20voluntad%20duele.mp3", liked: false },
            { title: "También sus espinas", url: "https://raw.githubusercontent.com/bryan7896/MusicBryan/main/Music/Tambi%C3%A9n%20sus%20espinas.mp3", liked: false },
            { title: "Te amo", url: "https://raw.githubusercontent.com/bryan7896/MusicBryan/main/Music/Te%20amo.mp3", liked: false },
            { title: "Todavía me sorprende", url: "https://raw.githubusercontent.com/bryan7896/MusicBryan/main/Music/Todav%C3%ADa%20me%20sorprende.mp3", liked: false },
            { title: "Tu nombre es mi respiración", url: "https://raw.githubusercontent.com/bryan7896/MusicBryan/main/Music/Tu%20nombre%20es%20mi%20respiraci%C3%B3n.mp3", liked: false }
        ];

        // ============================================
        // ⚙️ ESTADO
        // ============================================
        let currentIndex = 0;
        let isPlaying = false;
        let isDragging = false;
        let isShuffle = false;
        let isRepeat = false;
        let isDarkMode = true;
        let shuffleHistory = [];
        let currentSongLiked = false;

        const audio = new Audio();
        const toast = document.getElementById('toast');

        // DOM
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressFill = document.getElementById('progressFill');
        const progressBar = document.getElementById('progressBar');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');
        const volumeControl = document.getElementById('volumeControl');
        const currentTitle = document.getElementById('currentSongTitle');
        const currentArtist = document.getElementById('currentSongArtist');
        const favoriteBtn = document.getElementById('favoriteBtn');
        const likeBtn = document.getElementById('likeBtn');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const repeatBtn = document.getElementById('repeatBtn');
        const themeBtn = document.getElementById('themeBtn');
        const albumArt = document.getElementById('albumArt');
        const albumImage = document.getElementById('albumImage');
        const waves = document.querySelectorAll('.wave');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalPlaylist = document.getElementById('modalPlaylist');
        const openPlaylistBtn = document.getElementById('openPlaylistBtn');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const playlistBadge = document.getElementById('playlistBadge');

        // ============================================
        // 🛠️ FUNCIONES
        // ============================================

        function showToast(msg, duration = 2500) {
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.remove('show'), duration);
        }

        function loadSong(index) {
            const song = playlist[index];
            if (!song) return;

            audio.src = song.url;
            audio.load();
            currentTitle.textContent = song.title || `Canción ${index + 1}`;
            currentArtist.textContent = `${index + 1} de ${playlist.length}`;

            // Actualizar favorito
            currentSongLiked = song.liked || false;
            updateFavoriteUI();

            // Portada aleatoria con semilla fija por canción
            albumImage.src = `https://picsum.photos/seed/song${index + 1}/400/400`;

            // Actualizar lista
            updateModalPlaylist();
            updateWaves(false);

            if (isPlaying) {
                audio.play().catch(() => {
                    showToast('❌ Error al reproducir', false);
                    isPlaying = false;
                    playBtn.textContent = '▶';
                });
            }

            showToast(`🎵 ${song.title}`);
        }

        function togglePlay() {
            if (audio.src === '' || audio.src === 'about:blank') {
                loadSong(currentIndex);
                setTimeout(() => togglePlay(), 300);
                return;
            }

            if (isPlaying) {
                audio.pause();
                playBtn.textContent = '▶';
                isPlaying = false;
                updateWaves(false);
                albumArt.classList.remove('spinning');
            } else {
                audio.play().catch(() => {
                    showToast('❌ No se puede reproducir', false);
                });
                playBtn.textContent = '⏸';
                isPlaying = true;
                updateWaves(true);
                albumArt.classList.add('spinning');
            }
            updateModalPlaylist();
        }

        function prevSong() {
            if (isShuffle && shuffleHistory.length > 0) {
                currentIndex = shuffleHistory.pop() || 0;
            } else {
                currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
            }
            loadSong(currentIndex);
            if (isPlaying) {
                audio.play().catch(() => {});
            }
            updateModalPlaylist();
        }

        function nextSong() {
            if (isShuffle) {
                let next;
                do {
                    next = Math.floor(Math.random() * playlist.length);
                } while (next === currentIndex && playlist.length > 1);
                shuffleHistory.push(currentIndex);
                currentIndex = next;
            } else {
                currentIndex = (currentIndex + 1) % playlist.length;
            }
            loadSong(currentIndex);
            if (isPlaying) {
                audio.play().catch(() => {});
            }
            updateModalPlaylist();
        }

        function updateWaves(active) {
            waves.forEach(w => {
                if (active) {
                    w.classList.add('active');
                } else {
                    w.classList.remove('active');
                }
            });
        }

        function updateFavoriteUI() {
            const icon = currentSongLiked ? '❤️' : '🤍';
            favoriteBtn.textContent = icon;
            favoriteBtn.style.color = currentSongLiked ? '#FF6B6B' : '';
            likeBtn.textContent = currentSongLiked ? '❤️' : '🤍';
            likeBtn.style.color = currentSongLiked ? '#FF6B6B' : '';
        }

        function toggleFavorite() {
            if (playlist[currentIndex]) {
                playlist[currentIndex].liked = !playlist[currentIndex].liked;
                currentSongLiked = playlist[currentIndex].liked;
                updateFavoriteUI();
                updateModalPlaylist();
                showToast(currentSongLiked ? '⭐ Agregado a favoritos' : '💔 Eliminado de favoritos');
            }
        }

        function formatTime(seconds) {
            if (isNaN(seconds) || !isFinite(seconds) || seconds < 0) return '0:00';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${String(s).padStart(2, '0')}`;
        }

        function updateModalPlaylist() {
            modalPlaylist.innerHTML = '';
            playlist.forEach((song, i) => {
                const div = document.createElement('div');
                div.className = `modal-item ${i === currentIndex ? 'active' : ''}`;
                div.innerHTML = `
                    <span class="num">${String(i + 1).padStart(2, '0')}</span>
                    <div class="info">
                        <div class="title">${song.title || `Canción ${i + 1}`}</div>
                        <div class="sub">${song.liked ? '⭐ Favorita' : ''}</div>
                    </div>
                    ${i === currentIndex && isPlaying ? '<span class="status-icon">▶</span>' : ''}
                    <span class="fav-star ${song.liked ? 'favorited' : ''}">${song.liked ? '⭐' : ''}</span>
                `;
                div.addEventListener('click', () => {
                    currentIndex = i;
                    loadSong(i);
                    if (!isPlaying) togglePlay();
                    else audio.play().catch(() => {});
                    // Cerrar modal después de seleccionar
                    closeModal();
                });
                modalPlaylist.appendChild(div);
            });
            playlistBadge.textContent = playlist.length;
        }

        function openModal() {
            modalOverlay.classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modalOverlay.classList.remove('show');
            document.body.style.overflow = '';
        }

        // ============================================
        // 🎯 EVENT LISTENERS
        // ============================================

        playBtn.addEventListener('click', togglePlay);
        prevBtn.addEventListener('click', prevSong);
        nextBtn.addEventListener('click', nextSong);

        favoriteBtn.addEventListener('click', toggleFavorite);
        likeBtn.addEventListener('click', toggleFavorite);

        shuffleBtn.addEventListener('click', () => {
            isShuffle = !isShuffle;
            shuffleBtn.classList.toggle('active-shuffle', isShuffle);
            shuffleBtn.style.color = isShuffle ? '#FF6B6B' : '';
            showToast(isShuffle ? '🔀 Aleatorio activado' : '🔀 Aleatorio desactivado');
            if (isShuffle) shuffleHistory = [];
        });

        repeatBtn.addEventListener('click', () => {
            isRepeat = !isRepeat;
            repeatBtn.classList.toggle('active', isRepeat);
            showToast(isRepeat ? '🔁 Repetir activado' : '🔁 Repetir desactivado');
        });

        themeBtn.addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            const root = document.documentElement;
            if (isDarkMode) {
                root.style.setProperty('--bg-start', '#0f0c29');
                root.style.setProperty('--bg-mid', '#302b63');
                root.style.setProperty('--bg-end', '#24243e');
                root.style.setProperty('--text-primary', '#FFFFFF');
                root.style.setProperty('--text-secondary', '#B0B0B0');
                root.style.setProperty('--card-bg', 'rgba(255,255,255,0.06)');
                themeBtn.textContent = '🌙';
            } else {
                root.style.setProperty('--bg-start', '#f5f3ff');
                root.style.setProperty('--bg-mid', '#ede9fe');
                root.style.setProperty('--bg-end', '#ddd6fe');
                root.style.setProperty('--text-primary', '#1a1a2e');
                root.style.setProperty('--text-secondary', '#4a4a6a');
                root.style.setProperty('--card-bg', 'rgba(255,255,255,0.7)');
                themeBtn.textContent = '☀️';
            }
            showToast(isDarkMode ? '🌙 Modo oscuro' : '☀️ Modo claro');
        });

        // Volumen
        volumeControl.addEventListener('input', (e) => {
            audio.volume = parseFloat(e.target.value);
        });

        // Progreso
        audio.addEventListener('timeupdate', () => {
            if (!isDragging && audio.duration) {
                const p = (audio.currentTime / audio.duration) * 100;
                progressFill.style.width = `${p}%`;
                currentTimeEl.textContent = formatTime(audio.currentTime);
                totalTimeEl.textContent = formatTime(audio.duration);
            }
        });

        // Touch/Click en barra de progreso
        progressBar.addEventListener('mousedown', (e) => {
            isDragging = true;
            const rect = progressBar.getBoundingClientRect();
            const x = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
            audio.currentTime = x * audio.duration;
            progressFill.style.width = `${x * 100}%`;
        });

        document.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const rect = progressBar.getBoundingClientRect();
                let x = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
                audio.currentTime = x * audio.duration;
                progressFill.style.width = `${x * 100}%`;
                currentTimeEl.textContent = formatTime(audio.currentTime);
            }
        });

        document.addEventListener('mouseup', () => { isDragging = false; });

        // Touch para móviles
        progressBar.addEventListener('touchstart', (e) => {
            isDragging = true;
            const rect = progressBar.getBoundingClientRect();
            const touch = e.touches[0];
            const x = Math.max(0, Math.min(1, (touch.clientX - rect.left) / rect.width));
            audio.currentTime = x * audio.duration;
            progressFill.style.width = `${x * 100}%`;
        });

        progressBar.addEventListener('touchmove', (e) => {
            if (isDragging) {
                const rect = progressBar.getBoundingClientRect();
                const touch = e.touches[0];
                let x = Math.max(0, Math.min(1, (touch.clientX - rect.left) / rect.width));
                audio.currentTime = x * audio.duration;
                progressFill.style.width = `${x * 100}%`;
                currentTimeEl.textContent = formatTime(audio.currentTime);
            }
        });

        progressBar.addEventListener('touchend', () => { isDragging = false; });

        // Cuando termina la canción
        audio.addEventListener('ended', () => {
            if (isRepeat) {
                audio.currentTime = 0;
                audio.play().catch(() => {});
                showToast('🔁 Repitiendo canción');
            } else {
                nextSong();
            }
        });

        audio.addEventListener('error', () => {
            showToast('❌ Error al cargar la canción', false);
        });

        // Teclado
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            if (e.key === ' ' || e.key === 'Space') { e.preventDefault(); togglePlay(); }
            if (e.key === 'ArrowRight') nextSong();
            if (e.key === 'ArrowLeft') prevSong();
            if (e.key === 'Escape') closeModal();
        });

        // Modal
        openPlaylistBtn.addEventListener('click', openModal);
        closeModalBtn.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });

        // ============================================
        // 🚀 INICIALIZAR
        // ============================================
        loadSong(0);
        updateModalPlaylist();
        showToast('🎵 ¡Bienvenido!', 2000);

        console.log('🎵 Reproductor Móvil Premium iniciado');
        console.log(`📋 ${playlist.length} canciones cargadas`);
        console.log('🎯 Funciones: Aleatorio, Favoritos, Repetir, Modo Claro/Oscuro');
        console.log('📱 Abre la playlist con el botón inferior');
    </script>

</body>
</html>
