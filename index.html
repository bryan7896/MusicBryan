<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 Reproductor de Música - Bryan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .player-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 550px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        h1 {
            color: #1a1a2e;
            text-align: center;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 13px;
            margin-bottom: 25px;
        }

        .song-info {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 12px;
            margin-bottom: 20px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .song-title {
            font-size: 18px;
            font-weight: bold;
            color: #1a1a2e;
            margin-bottom: 5px;
        }

        .song-artist {
            color: #666;
            font-size: 14px;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 25px 0;
        }

        .controls button {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8f9fa;
            color: #1a1a2e;
        }

        .controls button:hover {
            transform: scale(1.1);
            background: #e9ecef;
        }

        .controls button:active {
            transform: scale(0.95);
        }

        .controls .play-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 65px;
            height: 65px;
            font-size: 32px;
        }

        .controls .play-btn:hover {
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .progress-container {
            width: 100%;
            margin: 15px 0;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e9ecef;
            border-radius: 3px;
            cursor: pointer;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s linear;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            color: #666;
            font-size: 12px;
            margin-top: 5px;
        }

        .playlist {
            margin-top: 25px;
            border-top: 1px solid #e9ecef;
            padding-top: 20px;
        }

        .playlist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .playlist-title {
            color: #1a1a2e;
            font-size: 14px;
            font-weight: bold;
        }

        .playlist-count {
            color: #999;
            font-size: 12px;
        }

        .playlist-items {
            max-height: 300px;
            overflow-y: auto;
        }

        .playlist-items::-webkit-scrollbar {
            width: 6px;
        }

        .playlist-items::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }

        .playlist-items::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 3px;
        }

        .playlist-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 3px;
        }

        .playlist-item:hover {
            background: #f8f9fa;
        }

        .playlist-item.active {
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            border-left: 3px solid #667eea;
        }

        .playlist-item .number {
            color: #999;
            font-size: 12px;
            width: 30px;
            flex-shrink: 0;
        }

        .playlist-item .info {
            flex: 1;
            min-width: 0;
        }

        .playlist-item .title {
            color: #333;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .playlist-item .playing-indicator {
            color: #667eea;
            font-size: 14px;
            margin-left: 10px;
            flex-shrink: 0;
        }

        .volume-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 15px 0 5px;
        }

        .volume-control input[type="range"] {
            width: 120px;
            height: 4px;
            -webkit-appearance: none;
            background: #e9ecef;
            border-radius: 2px;
            outline: none;
        }

        .volume-control input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
        }

        .volume-icon {
            font-size: 18px;
            color: #666;
        }

        .add-song-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e9ecef;
        }

        .add-song-section input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 8px;
            transition: border-color 0.3s ease;
        }

        .add-song-section input:focus {
            outline: none;
            border-color: #667eea;
        }

        .add-song-btn {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .add-song-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3);
        }

        .add-song-btn:active {
            transform: scale(0.98);
        }

        .status {
            background: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 13px;
            border: 1px solid #c3e6cb;
            display: none;
        }

        .status.show {
            display: block;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border-color: #f5c6cb;
        }

        @media (max-width: 480px) {
            .player-container {
                padding: 20px;
            }
            .controls button {
                width: 45px;
                height: 45px;
                font-size: 22px;
            }
            .controls .play-btn {
                width: 55px;
                height: 55px;
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <div class="player-container">
        <h1>🎵 Mi Reproductor</h1>
        <p class="subtitle">📚 Colección de música</p>
        
        <div id="statusMessage" class="status">
            ✅ Listo para reproducir
        </div>
        
        <div class="song-info">
            <div class="song-title" id="currentSongTitle">🎵 Selecciona una canción</div>
            <div class="song-artist" id="currentSongArtist">📋 Lista de reproducción</div>
        </div>

        <div class="controls">
            <button id="prevBtn" title="Anterior">⏮</button>
            <button id="playBtn" class="play-btn" title="Reproducir/Pausar">▶</button>
            <button id="nextBtn" title="Siguiente">⏭</button>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="time-info">
                <span id="currentTime">0:00</span>
                <span id="totalTime">0:00</span>
            </div>
        </div>

        <div class="volume-control">
            <span class="volume-icon">🔊</span>
            <input type="range" id="volumeControl" min="0" max="1" step="0.05" value="0.8">
        </div>

        <div class="playlist">
            <div class="playlist-header">
                <div class="playlist-title">📋 Lista de reproducción</div>
                <div class="playlist-count" id="playlistCount">0 canciones</div>
            </div>
            <div class="playlist-items" id="playlistItems"></div>
        </div>

        <div class="add-song-section">
            <input type="text" id="songUrlInput" placeholder="🔗 Pega el enlace MP3 aquí..." />
            <input type="text" id="songTitleInput" placeholder="📝 Nombre de la canción (opcional)" />
            <button class="add-song-btn" id="addSongBtn">➕ Agregar canción</button>
        </div>
    </div>

    <script>
        // ============================================
        // 🎵 LISTA DE CANCIONES (ENLACES RAW DE GITHUB)
        // ============================================
        const playlist = [
            { title: "EL QUE NO DUERME v1", url: "https://raw.githubusercontent.com/bryan7896/MusicBryan/main/Music/EL%20QUE%20NO%20DUERME%20v1.mp3" },
            { title: "EL QUE NO DUERME v2", url: "https://raw.githubusercontent.com/bryan7896/MusicBryan/main/Music/EL%20QUE%20NO%20DUERME%20v2.mp3" },
            { title: "El desorden perfecto", url: "https://raw.githubusercontent.com/bryan7896/MusicBryan/main/Music/El%20desorden%20perfecto.mp3" },
            { title: "El reloj se para", url: "https://raw.githubusercontent.com/bryan7896/MusicBryan/main/Music/El%20reloj%20se%20para.mp3" },
            { title: "El tamaño de tu mano", url: "https://raw.githubusercontent.com/bryan7896/MusicBryan/main/Music/El%20tama%C3%B1o%20de%20tu%20mano.mp3" },
            { title: "Mi lugar en el mundo", url: "https://raw.githubusercontent.com/bryan7896/MusicBryan/main/Music/Mi%20lugar%20en%20el%20mundo.mp3" },
            { title: "Mi princesa", url: "https://raw.githubusercontent.com/bryan7896/MusicBryan/main/Music/Mi%20princesa.mp3" },
            { title: "Si tu voluntad duele", url: "https://raw.githubusercontent.com/bryan7896/MusicBryan/main/Music/Si%20tu%20voluntad%20duele.mp3" },
            { title: "También sus espinas", url: "https://raw.githubusercontent.com/bryan7896/MusicBryan/main/Music/Tambi%C3%A9n%20sus%20espinas.mp3" },
            { title: "Te amo", url: "https://raw.githubusercontent.com/bryan7896/MusicBryan/main/Music/Te%20amo.mp3" },
            { title: "Todavía me sorprende", url: "https://raw.githubusercontent.com/bryan7896/MusicBryan/main/Music/Todav%C3%ADa%20me%20sorprende.mp3" },
            { title: "Tu nombre es mi respiración", url: "https://raw.githubusercontent.com/bryan7896/MusicBryan/main/Music/Tu%20nombre%20es%20mi%20respiraci%C3%B3n.mp3" }
        ];

        // ============================================
        // ⚙️ ESTADO DEL REPRODUCTOR
        // ============================================
        let currentSongIndex = 0;
        let isPlaying = false;
        let isDragging = false;

        const audio = new Audio();
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressFill = document.getElementById('progressFill');
        const progressBar = document.getElementById('progressBar');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');
        const volumeControl = document.getElementById('volumeControl');
        const currentSongTitle = document.getElementById('currentSongTitle');
        const currentSongArtist = document.getElementById('currentSongArtist');
        const playlistItems = document.getElementById('playlistItems');
        const playlistCount = document.getElementById('playlistCount');
        const songUrlInput = document.getElementById('songUrlInput');
        const songTitleInput = document.getElementById('songTitleInput');
        const addSongBtn = document.getElementById('addSongBtn');
        const statusMessage = document.getElementById('statusMessage');

        // ============================================
        // 🛠️ FUNCIONES
        // ============================================

        function showStatus(message, isSuccess = true) {
            statusMessage.textContent = message;
            statusMessage.className = `status show ${isSuccess ? '' : 'error'}`;
            setTimeout(() => {
                statusMessage.className = 'status';
            }, 4000);
        }

        function loadSong(index) {
            const song = playlist[index];
            if (!song) {
                showStatus('❌ Canción no encontrada', false);
                return;
            }

            audio.src = song.url;
            audio.load();
            currentSongTitle.textContent = song.title || `Canción ${index + 1}`;
            currentSongArtist.textContent = `${index + 1} de ${playlist.length}`;
            updatePlaylistUI();
            
            if (isPlaying) {
                audio.play().catch(e => {
                    console.error('Error al reproducir:', e);
                    showStatus('❌ Error al reproducir la canción', false);
                    isPlaying = false;
                    playBtn.textContent = '▶';
                });
            }
            
            showStatus(`🎵 Reproduciendo: ${song.title}`);
        }

        function togglePlay() {
            if (audio.src === '' || audio.src === 'about:blank') {
                loadSong(currentSongIndex);
                setTimeout(() => togglePlay(), 300);
                return;
            }

            if (isPlaying) {
                audio.pause();
                playBtn.textContent = '▶';
                isPlaying = false;
            } else {
                audio.play().catch(e => {
                    console.error('Error al reproducir:', e);
                    showStatus('❌ No se puede reproducir. Verifica el enlace.', false);
                });
                playBtn.textContent = '⏸';
                isPlaying = true;
            }
        }

        function prevSong() {
            currentSongIndex = (currentSongIndex - 1 + playlist.length) % playlist.length;
            loadSong(currentSongIndex);
            if (isPlaying) {
                audio.play().catch(e => console.error('Error:', e));
            }
        }

        function nextSong() {
            currentSongIndex = (currentSongIndex + 1) % playlist.length;
            loadSong(currentSongIndex);
            if (isPlaying) {
                audio.play().catch(e => console.error('Error:', e));
            }
        }

        function updatePlaylistUI() {
            playlistItems.innerHTML = '';
            playlist.forEach((song, index) => {
                const item = document.createElement('div');
                item.className = `playlist-item ${index === currentSongIndex ? 'active' : ''}`;
                item.innerHTML = `
                    <span class="number">${String(index + 1).padStart(2, '0')}</span>
                    <div class="info">
                        <div class="title">${song.title || `Canción ${index + 1}`}</div>
                    </div>
                    ${index === currentSongIndex && isPlaying ? '<span class="playing-indicator">▶</span>' : ''}
                `;
                item.addEventListener('click', () => {
                    currentSongIndex = index;
                    loadSong(index);
                    if (!isPlaying) {
                        togglePlay();
                    } else {
                        audio.play().catch(e => console.error('Error:', e));
                    }
                });
                playlistItems.appendChild(item);
            });
            playlistCount.textContent = `${playlist.length} canciones`;
        }

        function formatTime(seconds) {
            if (isNaN(seconds) || !isFinite(seconds) || seconds < 0) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function addSong() {
            const url = songUrlInput.value.trim();
            const title = songTitleInput.value.trim() || `Canción ${playlist.length + 1}`;
            
            if (!url) {
                showStatus('⚠️ Por favor, ingresa un enlace', false);
                return;
            }

            // Validar URL
            try {
                new URL(url);
            } catch {
                showStatus('❌ El enlace no es válido', false);
                return;
            }

            playlist.push({ title, url });
            songUrlInput.value = '';
            songTitleInput.value = '';
            updatePlaylistUI();
            showStatus(`✅ "${title}" agregada a la lista!`);
            
            if (audio.src === '' || audio.src === 'about:blank') {
                currentSongIndex = 0;
                loadSong(0);
            }
        }

        // ============================================
        // 🎯 EVENT LISTENERS
        // ============================================

        playBtn.addEventListener('click', togglePlay);
        prevBtn.addEventListener('click', prevSong);
        nextBtn.addEventListener('click', nextSong);

        // Teclado
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
            if (e.key === 'ArrowRight') nextSong();
            if (e.key === 'ArrowLeft') prevSong();
        });

        audio.addEventListener('timeupdate', () => {
            if (!isDragging && audio.duration) {
                const progress = (audio.currentTime / audio.duration) * 100;
                progressFill.style.width = `${progress}%`;
                currentTimeEl.textContent = formatTime(audio.currentTime);
                totalTimeEl.textContent = formatTime(audio.duration);
            }
        });

        progressBar.addEventListener('mousedown', (e) => {
            isDragging = true;
            const rect = progressBar.getBoundingClientRect();
            const x = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
            const newTime = x * audio.duration;
            audio.currentTime = newTime;
            progressFill.style.width = `${x * 100}%`;
        });

        document.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const rect = progressBar.getBoundingClientRect();
                let x = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
                const newTime = x * audio.duration;
                audio.currentTime = newTime;
                progressFill.style.width = `${x * 100}%`;
                currentTimeEl.textContent = formatTime(newTime);
            }
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
        });

        volumeControl.addEventListener('input', (e) => {
            audio.volume = parseFloat(e.target.value);
        });

        audio.addEventListener('ended', () => {
            nextSong();
        });

        audio.addEventListener('error', (e) => {
            console.error('Error en el audio:', e);
            showStatus('❌ Error al cargar la canción. Verifica el enlace.', false);
        });

        // ============================================
        // 🚀 INICIALIZAR
        // ============================================
        loadSong(0);
        updatePlaylistUI();

        addSongBtn.addEventListener('click', addSong);
        songUrlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addSong();
        });

        console.log('🎵 Reproductor iniciado correctamente');
        console.log(`📋 ${playlist.length} canciones cargadas desde GitHub`);
        console.log('🎯 Presiona ESPACIO para reproducir/pausar');
    </script>
</body>
</html>
