<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor de Música</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .player-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .song-info {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .song-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .song-artist {
            color: #666;
            font-size: 14px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }

        .controls button {
            background: none;
            border: none;
            font-size: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8f9fa;
        }

        .controls button:hover {
            transform: scale(1.1);
            background: #e9ecef;
        }

        .controls button:active {
            transform: scale(0.95);
        }

        .progress-container {
            width: 100%;
            margin: 20px 0;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e9ecef;
            border-radius: 3px;
            cursor: pointer;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s linear;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            color: #666;
            font-size: 12px;
            margin-top: 5px;
        }

        .playlist {
            margin-top: 30px;
            border-top: 1px solid #e9ecef;
            padding-top: 20px;
        }

        .playlist-title {
            color: #333;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .playlist-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 5px;
        }

        .playlist-item:hover {
            background: #f8f9fa;
        }

        .playlist-item.active {
            background: #e9ecef;
        }

        .playlist-item .number {
            color: #999;
            font-size: 12px;
            width: 25px;
        }

        .playlist-item .info {
            flex: 1;
        }

        .playlist-item .title {
            color: #333;
            font-size: 14px;
        }

        .playlist-item .duration {
            color: #999;
            font-size: 12px;
        }

        .playlist-item .playing-indicator {
            color: #667eea;
            font-size: 12px;
            margin-left: 10px;
        }

        .volume-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
        }

        .volume-control input[type="range"] {
            width: 100px;
            height: 4px;
            -webkit-appearance: none;
            background: #e9ecef;
            border-radius: 2px;
            outline: none;
        }

        .volume-control input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
        }

        .volume-icon {
            font-size: 18px;
            color: #666;
        }

        .add-song-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e9ecef;
        }

        .add-song-section input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 10px;
            transition: border-color 0.3s ease;
        }

        .add-song-section input:focus {
            outline: none;
            border-color: #667eea;
        }

        .add-song-btn {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .add-song-btn:hover {
            transform: scale(1.02);
        }

        .add-song-btn:active {
            transform: scale(0.98);
        }

        .warning {
            background: #fff3cd;
            color: #856404;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 13px;
            text-align: center;
            border: 1px solid #ffc107;
        }

        .warning a {
            color: #856404;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="player-container">
        <h1>🎵 Mi Reproductor</h1>
        
        <div class="warning">
            ⚠️ Para mejor funcionamiento, usa un servidor local.<br>
            <a href="#" onclick="alert('Instala Live Server en VS Code o usa Python: python -m http.server 8000')">Ver instrucciones</a>
        </div>
        
        <div class="song-info">
            <div class="song-title" id="currentSongTitle">Selecciona una canción</div>
            <div class="song-artist" id="currentSongArtist">Lista de reproducción</div>
        </div>

        <div class="controls">
            <button id="prevBtn" title="Anterior">⏮</button>
            <button id="playBtn" title="Reproducir/Pausar">▶</button>
            <button id="nextBtn" title="Siguiente">⏭</button>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="time-info">
                <span id="currentTime">0:00</span>
                <span id="totalTime">0:00</span>
            </div>
        </div>

        <div class="volume-control">
            <span class="volume-icon">🔊</span>
            <input type="range" id="volumeControl" min="0" max="1" step="0.1" value="0.8">
        </div>

        <div class="playlist">
            <div class="playlist-title">📋 Lista de reproducción</div>
            <div id="playlistItems"></div>
        </div>

        <div class="add-song-section">
            <input type="text" id="songUrlInput" placeholder="Pega el enlace MP3 aquí..." />
            <input type="text" id="songTitleInput" placeholder="Nombre de la canción (opcional)" />
            <button class="add-song-btn" id="addSongBtn">➕ Agregar canción</button>
        </div>
    </div>

    <script>
        // ============================================
        // LISTA DE CANCIONES (con enlaces DIRECTOS)
        // ============================================
        const playlist = [
            {
                title: "Canción 1",
                url: "https://drive.google.com/uc?export=download&id=1kZIAkLGI3-1fT02aHl8Ue0zR6L9-fLqC"
            },
            {
                title: "Canción 2",
                url: "https://drive.google.com/uc?export=download&id=1LzBb35FemOztRY_kJTLujOaM4HGX-pTL"
            }
        ];

        // ============================================
        // ESTADO DEL REPRODUCTOR
        // ============================================
        let currentSongIndex = 0;
        let isPlaying = false;
        let isDragging = false;

        const audio = new Audio();
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressFill = document.getElementById('progressFill');
        const progressBar = document.getElementById('progressBar');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');
        const volumeControl = document.getElementById('volumeControl');
        const currentSongTitle = document.getElementById('currentSongTitle');
        const currentSongArtist = document.getElementById('currentSongArtist');
        const playlistItems = document.getElementById('playlistItems');
        const songUrlInput = document.getElementById('songUrlInput');
        const songTitleInput = document.getElementById('songTitleInput');
        const addSongBtn = document.getElementById('addSongBtn');

        // ============================================
        // FUNCIONES
        // ============================================

        function loadSong(index) {
            const song = playlist[index];
            if (!song) return;

            // IMPORTANTE: Para Google Drive, usar el formato de descarga directa
            let url = song.url;
            if (url.includes('drive.google.com')) {
                const match = url.match(/\/d\/([^\/]+)/);
                if (match) {
                    url = `https://drive.google.com/uc?export=download&id=${match[1]}`;
                }
            }

            audio.src = url;
            audio.load();
            currentSongTitle.textContent = song.title || `Canción ${index + 1}`;
            currentSongArtist.textContent = `Canción ${index + 1} de ${playlist.length}`;
            updatePlaylistUI();
            
            if (isPlaying) {
                audio.play().catch(e => {
                    console.log('Error al reproducir:', e);
                    alert('No se pudo reproducir la canción. Asegúrate de que el enlace sea accesible.');
                });
            }
        }

        function togglePlay() {
            if (audio.src === '') {
                loadSong(currentSongIndex);
                setTimeout(() => togglePlay(), 100);
                return;
            }

            if (isPlaying) {
                audio.pause();
                playBtn.textContent = '▶';
            } else {
                audio.play().catch(e => {
                    console.log('Error al reproducir:', e);
                    alert('No se pudo reproducir la canción. Verifica el enlace.');
                });
                playBtn.textContent = '⏸';
            }
            isPlaying = !isPlaying;
        }

        function prevSong() {
            currentSongIndex = (currentSongIndex - 1 + playlist.length) % playlist.length;
            loadSong(currentSongIndex);
            if (isPlaying) {
                audio.play().catch(e => console.log('Error al reproducir:', e));
            }
        }

        function nextSong() {
            currentSongIndex = (currentSongIndex + 1) % playlist.length;
            loadSong(currentSongIndex);
            if (isPlaying) {
                audio.play().catch(e => console.log('Error al reproducir:', e));
            }
        }

        function updatePlaylistUI() {
            playlistItems.innerHTML = '';
            playlist.forEach((song, index) => {
                const item = document.createElement('div');
                item.className = `playlist-item ${index === currentSongIndex ? 'active' : ''}`;
                item.innerHTML = `
                    <span class="number">${index + 1}</span>
                    <div class="info">
                        <div class="title">${song.title || `Canción ${index + 1}`}</div>
                    </div>
                    ${index === currentSongIndex && isPlaying ? '<span class="playing-indicator">▶</span>' : ''}
                `;
                item.addEventListener('click', () => {
                    currentSongIndex = index;
                    loadSong(index);
                    if (!isPlaying) {
                        togglePlay();
                    } else {
                        audio.play().catch(e => console.log('Error al reproducir:', e));
                    }
                });
                playlistItems.appendChild(item);
            });
        }

        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function addSong() {
            const url = songUrlInput.value.trim();
            const title = songTitleInput.value.trim() || `Canción ${playlist.length + 1}`;
            
            if (!url) {
                alert('Por favor, ingresa un enlace de MP3 válido');
                return;
            }

            playlist.push({ title, url });
            songUrlInput.value = '';
            songTitleInput.value = '';
            updatePlaylistUI();
            
            if (audio.src === '') {
                currentSongIndex = 0;
                loadSong(0);
            }
        }

        // ============================================
        // EVENT LISTENERS
        // ============================================

        playBtn.addEventListener('click', togglePlay);
        prevBtn.addEventListener('click', prevSong);
        nextBtn.addEventListener('click', nextSong);

        audio.addEventListener('timeupdate', () => {
            if (!isDragging) {
                const progress = (audio.currentTime / audio.duration) * 100;
                progressFill.style.width = `${progress}%`;
                currentTimeEl.textContent = formatTime(audio.currentTime);
                totalTimeEl.textContent = formatTime(audio.duration);
            }
        });

        progressBar.addEventListener('mousedown', (e) => {
            isDragging = true;
            const rect = progressBar.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width;
            const newTime = x * audio.duration;
            audio.currentTime = newTime;
            progressFill.style.width = `${x * 100}%`;
        });

        document.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const rect = progressBar.getBoundingClientRect();
                let x = (e.clientX - rect.left) / rect.width;
                x = Math.max(0, Math.min(1, x));
                const newTime = x * audio.duration;
                audio.currentTime = newTime;
                progressFill.style.width = `${x * 100}%`;
                currentTimeEl.textContent = formatTime(newTime);
            }
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
        });

        volumeControl.addEventListener('input', (e) => {
            audio.volume = parseFloat(e.target.value);
        });

        audio.addEventListener('ended', nextSong);

        // Cargar primera canción
        loadSong(0);

        addSongBtn.addEventListener('click', addSong);
        songUrlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addSong();
        });

        updatePlaylistUI();
        console.log('🎵 Reproductor iniciado');
    </script>
</body>
</html>
